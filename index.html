<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<meta
  name="format-detection"
  content="telephone=no"
>

<title>Mike's Transport Service</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  padding:14px;
  background:#f5f5f5;
  font-family:Arial,sans-serif;
  color:#111;
}

.container{
  max-width:720px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:16px;
  box-shadow:0 2px 12px rgba(0,0,0,0.08);
}

.header{
  text-align:center;
  margin-bottom:22px;
}

.header h1{
  margin:0;
  font-size:30px;
}

.header h2{
  margin-top:6px;
  color:#666;
  font-size:18px;
  font-weight:normal;
}

.section-title{
  margin-top:26px;
  margin-bottom:10px;
  font-size:18px;
  font-weight:bold;
  border-bottom:1px solid #ddd;
  padding-bottom:6px;
}

label{
  display:block;
  margin-top:16px;
  margin-bottom:6px;
  font-size:16px;
  font-weight:bold;
}

input,
textarea,
select,
button{
  width:100%;
  padding:16px;
  font-size:17px;
  border-radius:12px;
  border:1px solid #ccc;
  background:white;
}

textarea{
  min-height:100px;
  resize:vertical;
}

input:focus,
textarea:focus,
select:focus{
  outline:2px solid #111;
  border-color:#111;
}

button{
  margin-top:14px;
  background:#111;
  color:white;
  font-weight:bold;
  border:none;
  cursor:pointer;
}

button:active{
  transform:scale(0.98);
}

.status{
  text-align:center;
  padding:12px;
  border-radius:12px;
  margin-bottom:18px;
  background:white;
  border:1px solid #ddd;
  font-weight:bold;
}

.test-btn{
  background:#1a73e8;
}

.footer-space{
  height:20px;
}

@media(max-width:600px){

  body{
    padding:10px;
  }

  .container{
    padding:16px;
  }

  input,
  textarea,
  select,
  button{
    font-size:18px;
    padding:18px;
  }

}

</style>
</head>

<body>

<div class="container">

<div class="header">

<h1>
Mike's Transport Service
</h1>

<h2>
Dispatcher Dashboard
</h2>

</div>

<div
  id="connectionStatus"
  class="status"
></div>

<!-- TEST BUTTON -->
<button
  class="test-btn"
  onclick="loadTestRide()"
>
🧪 Load Test Ride
</button>

<!-- RIDE DETAILS -->
<div class="section-title">
Ride Details
</div>

<label>
Customer Name
</label>

<input
  id="name"
  placeholder="Customer Name"
>

<label>
Flight Number
</label>

<input
  id="flight"
  placeholder="Flight Number"
>

<label>
Customer Phone
</label>

<input
  id="phone"
  type="tel"
  placeholder="Customer Phone"
>

<label>
Home Address
</label>

<input
  id="home"
  placeholder="Home Address"
>

<label>
Pickup Address
</label>

<input
  id="pickup"
  placeholder="Pickup Address"
>

<label>
Drop-off Address
</label>

<input
  id="dropoff"
  placeholder="Drop-off Address"
>

<label>
Date
</label>

<input
  id="date"
  type="date"
>

<label>
Time
</label>

<input
  id="time"
  type="time"
>

<label>
Assign Driver
</label>

<select id="driverPhone">

<option value="">
Select Driver
</option>

<option value="9124014964">
Mike
</option>

<option value="9126436340">
Marcus
</option>

<option value="7049687843">
Bill
</option>

<option value="9123417484">
Rod
</option>

<option value="4406548497">
Taylor
</option>

</select>

<label>
Driver Instructions
</label>

<textarea
  id="driverComments"
  placeholder="Driver Instructions"
></textarea>

<!-- ACTIONS -->
<div class="section-title">
Dispatcher Actions
</div>

<button onclick="callCustomer()">
📞 Call Customer
</button>

<button onclick="processCalendarEvent()">
📅 Add to Google Calendar + Download .ICS
</button>

<button onclick="textDriver()">
🚕 Dispatch Driver
</button>

<button onclick="sendConfirmation()">
📩 Send Customer Confirmation
</button>

<button onclick="downloadVCF()">
👤 Save Customer Contact
</button>

<button onclick="openWaze()">
🗺 Open Waze Route
</button>

<button onclick="clearForm()">
🗑 Clear Ride Form
</button>

<div class="footer-space"></div>

</div>

<script>

// ======================
// CONNECTION STATUS
// ======================
function updateConnectionStatus(){

  const status =
    document.getElementById(
      "connectionStatus"
    );

  if(navigator.onLine){

    status.innerHTML =
    "🟢 Online";

    status.style.color =
    "green";

  } else {

    status.innerHTML =
    "🔴 Offline";

    status.style.color =
    "red";

  }

}

updateConnectionStatus();

window.addEventListener(
  "online",
  updateConnectionStatus
);

window.addEventListener(
  "offline",
  updateConnectionStatus
);


// ======================
// LOAD TEST RIDE
// ======================
function loadTestRide(){

  document.getElementById(
    "name"
  ).value =
  "Test Passenger";

  document.getElementById(
    "phone"
  ).value =
  "9126436340";

  document.getElementById(
    "pickup"
  ).value =
  "SAV Airport";

  document.getElementById(
    "dropoff"
  ).value =
  "1260 May River Rd, Bluffton SC";

  document.getElementById(
    "date"
  ).value =
  new Date()
  .toISOString()
  .split("T")[0];

  document.getElementById(
    "time"
  ).value =
  "12:00";

}


// ======================
// SAFE FILE NAME
// ======================
function safeFileName(text){

  return text
    .replace(/[^\w\s-]/g,"")
    .replace(/\s+/g,"_");

}


// ======================
// FORMAT DATE
// ======================
function formatICS(date,time){

  return date.replaceAll("-","")
    + "T"
    + time.replace(":","")
    + "00";

}


// ======================
// PLUS 1 HOUR
// ======================
function plusHour(date,time){

  const d =
    new Date(`${date}T${time}`);

  d.setHours(
    d.getHours() + 1
  );

  const pad =
    n => String(n)
    .padStart(2,"0");

  return (
    d.getFullYear() +
    pad(d.getMonth()+1) +
    pad(d.getDate()) +
    "T" +
    pad(d.getHours()) +
    pad(d.getMinutes()) +
    "00"
  );

}


// ======================
// GOOGLE CALENDAR
// ======================
function processCalendarEvent(){

  const name =
    document.getElementById(
      "name"
    ).value;

  const pickup =
    document.getElementById(
      "pickup"
    ).value;

  const dropoff =
    document.getElementById(
      "dropoff"
    ).value;

  const phone =
    document.getElementById(
      "phone"
    ).value;

  const date =
    document.getElementById(
      "date"
    ).value;

  const time =
    document.getElementById(
      "time"
    ).value;

  const details =
`Customer: ${name}

Phone: ${phone}

Pickup:
${pickup}

Drop-off:
${dropoff}`;

  const url =
`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent("Ride for " + name)}&dates=${formatICS(date,time)}/${plusHour(date,time)}&details=${encodeURIComponent(details)}&location=${encodeURIComponent(pickup)}`;

  window.open(
    url,
    "_blank"
  );

  downloadICS();

}


// ======================
// DOWNLOAD ICS
// ======================
function downloadICS(){

  const name =
    document.getElementById(
      "name"
    ).value;

  const phone =
    document.getElementById(
      "phone"
    ).value;

  const pickup =
    document.getElementById(
      "pickup"
    ).value;

  const dropoff =
    document.getElementById(
      "dropoff"
    ).value;

  const date =
    document.getElementById(
      "date"
    ).value;

  const time =
    document.getElementById(
      "time"
    ).value;

  const now =
    new Date()
    .toISOString()
    .replace(/[-:]/g,"")
    .split(".")[0];

  const ics =
`BEGIN:VCALENDAR
VERSION:2.0
BEGIN:VEVENT
DTSTAMP:${now}
DTSTART:${formatICS(date,time)}
DTEND:${plusHour(date,time)}
SUMMARY:Ride for ${name}
DESCRIPTION:Phone: ${phone}\\nPickup: ${pickup}\\nDrop-off: ${dropoff}
LOCATION:${pickup}
END:VEVENT
END:VCALENDAR`;

  const blob =
    new Blob(
      [ics],
      {
        type:
"text/calendar;charset=utf-8"
      }
    );

  const link =
    document.createElement("a");

  link.href =
    URL.createObjectURL(blob);

  link.download =
`${safeFileName(name)}-${date}-${time}.ics`;

  document.body.appendChild(
    link
  );

  link.click();

  document.body.removeChild(
    link
  );

}


// ======================
// SAVE CONTACT
// ======================
function downloadVCF(){

  const name =
    document.getElementById(
      "name"
    ).value;

  const phone =
    document.getElementById(
      "phone"
    ).value;

  const home =
    document.getElementById(
      "home"
    ).value;

  const vcf =
`BEGIN:VCARD
VERSION:3.0
FN:${name}
TEL;TYPE=CELL:${phone}
ADR;TYPE=HOME:;;${home}
END:VCARD`;

  const blob =
    new Blob(
      [vcf],
      {
        type:
"text/vcard"
      }
    );

  const link =
    document.createElement("a");

  link.href =
    URL.createObjectURL(blob);

  link.download =
`${safeFileName(name)}.vcf`;

  document.body.appendChild(
    link
  );

  link.click();

  document.body.removeChild(
    link
  );

}


// ======================
// DISPATCH DRIVER
// ======================
function textDriver(){

  const driver =
    document.getElementById(
      "driverPhone"
    ).value;

  if(!driver){

    alert(
      "Select a driver first."
    );

    return;

  }

  downloadICS();
  downloadVCF();

  const driverName =
    document.getElementById(
      "driverPhone"
    ).options[
      document.getElementById(
        "driverPhone"
      ).selectedIndex
    ].text;

  const name =
    document.getElementById(
      "name"
    ).value;

  const phone =
    document.getElementById(
      "phone"
    ).value;

  const pickup =
    document.getElementById(
      "pickup"
    ).value;

  const dropoff =
    document.getElementById(
      "dropoff"
    ).value;

  const date =
    document.getElementById(
      "date"
    ).value;

  const time =
    document.getElementById(
      "time"
    ).value;

  const instructions =
    document.getElementById(
      "driverComments"
    ).value || "None";

  const msg =
`🚕 DRIVER ASSIGNMENT

Driver:
${driverName}

Customer:
${name}

Customer Phone:
${phone}

Pickup:
${pickup}

Drop-off:
${dropoff}

Date:
${date}

Time:
${time}

Instructions:
${instructions}

IMPORTANT:
Attach the downloaded .ICS and .VCF files to this text message before sending.`;

  window.location.href =
`sms:${driver}?body=${encodeURIComponent(msg)}`;

}


// ======================
// CUSTOMER CONFIRMATION
// ======================
function sendConfirmation(){

  const phone =
    document.getElementById(
      "phone"
    ).value;

  const name =
    document.getElementById(
      "name"
    ).value;

  const pickup =
    document.getElementById(
      "pickup"
    ).value;

  const dropoff =
    document.getElementById(
      "dropoff"
    ).value;

  const date =
    document.getElementById(
      "date"
    ).value;

  const time =
    document.getElementById(
      "time"
    ).value;

  const driverSelect =
    document.getElementById(
      "driverPhone"
    );

  const driverPhone =
    driverSelect.value ||
    "Not Assigned";

  const driverName =
    driverSelect.options[
      driverSelect.selectedIndex
    ].text ||
    "Not Assigned";

  const message =
`Hi ${name},

Your ride with Mike's Transport Service is confirmed.

Pickup:
${pickup}

Drop-off:
${dropoff}

Date:
${date}

Time:
${time}

Assigned Driver:
${driverName}

Driver Phone:
${driverPhone}

Thank you for choosing Mike's Transport Service.`;

  window.location.href =
`sms:${phone}?body=${encodeURIComponent(message)}`;

}


// ======================
// CALL CUSTOMER
// ======================
function callCustomer(){

  const phone =
    document.getElementById(
      "phone"
    ).value;

  window.location.href =
`tel:${phone}`;

}


// ======================
// WAZE
// ======================
function openWaze(){

  const pickup =
    document.getElementById(
      "pickup"
    ).value;

  const dropoff =
    document.getElementById(
      "dropoff"
    ).value;

  const url =
`https://www.waze.com/ul?ll=&q=${encodeURIComponent(pickup + " to " + dropoff)}&navigate=yes`;

  window.open(
    url,
    "_blank"
  );

}


// ======================
// CLEAR FORM
// ======================
function clearForm(){

  if(
    !confirm(
      "Clear ride form?"
    )
  ) return;

  document.querySelectorAll(
    "input, textarea"
  ).forEach(field => {

    field.value = "";

  });

  document.getElementById(
    "driverPhone"
  ).selectedIndex = 0;

}

</script>

</body>
</html>
