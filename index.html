<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<meta
  name="format-detection"
  content="telephone=no"
>

<title>Mike's Transport Service</title>

<!-- PWA -->
<link rel="manifest" href="dispatcher-manifest.json">

<meta
  name="theme-color"
  content="#111111"
>

<meta
  name="apple-mobile-web-app-capable"
  content="yes"
>

<meta
  name="mobile-web-app-capable"
  content="yes"
>

<meta
  name="apple-mobile-web-app-status-bar-style"
  content="black"
>

<meta
  name="apple-mobile-web-app-title"
  content="Mike Dispatch"
>

<link
  rel="apple-touch-icon"
  href="dispatcher-192.png"
>

<style>

html {
  -webkit-text-size-adjust: 100%;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 14px;
  background: #f5f5f5;
  font-family: Arial, sans-serif;
  color: #111;
}

.container {
  max-width: 720px;
  margin: auto;
  background: #fff;
  padding: 22px;
  border-radius: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
}

.header {
  text-align: center;
  margin-bottom: 22px;
}

.header h1 {
  margin: 0;
  font-size: 30px;
}

.header h2 {
  margin-top: 6px;
  color: #666;
  font-size: 18px;
  font-weight: normal;
}

.section-title {
  margin-top: 26px;
  margin-bottom: 10px;
  font-size: 19px;
  font-weight: bold;
  border-bottom: 1px solid #ddd;
  padding-bottom: 6px;
}

label {
  display: block;
  margin-top: 16px;
  margin-bottom: 6px;
  font-weight: bold;
  font-size: 15px;
}

input,
textarea,
select,
button {
  width: 100%;
  padding: 16px;
  font-size: 17px;
  border-radius: 12px;
  border: 1px solid #ccc;
  background: white;
}

textarea {
  min-height: 110px;
  resize: vertical;
}

input:focus,
textarea:focus,
select:focus {
  outline: 2px solid #111;
  border-color: #111;
}

button {
  margin-top: 14px;
  border: none;
  background: #111;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  opacity: 0.94;
}

button:active {
  transform: scale(0.98);
}

.status-bar {
  margin-bottom: 18px;
  padding: 14px;
  border-radius: 12px;
  text-align: center;
  background: #fff;
  border: 1px solid #ddd;
  font-size: 16px;
}

.notice {
  margin-top: 22px;
  text-align: center;
  font-size: 14px;
  color: #666;
}

.footer-space {
  height: 20px;
}

@media (max-width: 600px) {

  body {
    padding: 10px;
  }

  .container {
    padding: 16px;
    border-radius: 12px;
  }

  .header h1 {
    font-size: 25px;
  }

  .header h2 {
    font-size: 16px;
  }

  input,
  textarea,
  select,
  button {
    font-size: 18px;
    padding: 18px;
  }

}

</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">

    <h1>
      Mike's Transport Service
    </h1>

    <h2>
      Dispatcher Dashboard
    </h2>

  </div>

  <!-- CONNECTION STATUS -->
  <div
    id="connectionStatus"
    class="status-bar"
  ></div>

  <!-- RIDE DETAILS -->
  <div class="section-title">
    Ride Details
  </div>

  <label for="name">
    Customer Name
  </label>

  <input
    id="name"
    placeholder="Customer Name"
    autocomplete="name"
  >

  <label for="flight">
    Flight Number
  </label>

  <input
    id="flight"
    placeholder="Flight Number"
  >

  <label for="phone">
    Customer Phone
  </label>

  <input
    id="phone"
    type="tel"
    inputmode="tel"
    placeholder="Customer Phone"
    autocomplete="tel"
  >

  <label for="pickup">
    Pickup Address
  </label>

  <input
    id="pickup"
    placeholder="Pickup Address"
  >

  <label for="dropoff">
    Drop-off Address
  </label>

  <input
    id="dropoff"
    placeholder="Drop-off Address"
  >

  <label for="date">
    Date
  </label>

  <input
    id="date"
    type="date"
  >

  <label for="time">
    Time
  </label>

  <input
    id="time"
    type="time"
  >

  <label for="driverPhone">
    Assign Driver
  </label>

  <select id="driverPhone">

    <option value="">
      Select Driver
    </option>

    <option value="9124014964">
      Mike
    </option>

    <option value="9126436340">
      Marcus
    </option>

    <option value="7049687843">
      Bill
    </option>

    <option value="9123417484">
      Rod
    </option>

    <option value="4406548497">
      Taylor
    </option>

  </select>

  <label for="driverComments">
    Driver Instructions
  </label>

  <textarea
    id="driverComments"
    maxlength="400"
    placeholder="Driver Instructions"
  ></textarea>

  <!-- ACTIONS -->
  <div class="section-title">
    Dispatcher Actions
  </div>

  <button onclick="callCustomer()">
    📞 Call Customer
  </button>

  <button onclick="textDriver()">
    🚕 Dispatch Driver
  </button>

  <button onclick="sendConfirmation()">
    📩 Send Customer Confirmation
  </button>

  <button onclick="processCalendarEvent()">
    📅 Add to Calendar + Download .ICS
  </button>

  <button onclick="downloadVCF()">
    👤 Save Customer Contact
  </button>

  <button onclick="openWaze()">
    🗺 Open Pickup in Waze
  </button>

  <button onclick="clearForm()">
    🗑 Clear Ride Form
  </button>

  <div class="notice">
    Optimized for iPhone, Android, Chrome, Safari, and Desktop.
  </div>

  <div class="footer-space"></div>

</div>

<script>

// ======================
// SERVICE WORKER
// ======================
if ("serviceWorker" in navigator) {

  window.addEventListener(
    "load",
    () => {

      navigator.serviceWorker
        .register("sw.js")
        .catch(() => {});

    }
  );
}

// ======================
// ONLINE STATUS
// ======================
function updateConnectionStatus() {

  const status =
    document.getElementById(
      "connectionStatus"
    );

  if (navigator.onLine) {

    status.innerHTML =
`
<span style="
color:green;
font-weight:bold;
font-size:18px;
">
🟢 Online
</span>
`;

  } else {

    status.innerHTML =
`
<span style="
color:red;
font-weight:bold;
font-size:18px;
">
🔴 Offline Mode
</span>

<br><br>

SMS dispatch still works.
`;
  }
}

window.addEventListener(
  "load",
  updateConnectionStatus
);

window.addEventListener(
  "online",
  updateConnectionStatus
);

window.addEventListener(
  "offline",
  updateConnectionStatus
);

window.addEventListener(
  "focus",
  updateConnectionStatus
);

// ======================
// IMPORT URL PARAMETERS
// ======================
function importRide() {

  const params =
    new URLSearchParams(
      window.location.search
    );

  const fields = [
    "name",
    "flight",
    "phone",
    "pickup",
    "dropoff",
    "date",
    "time"
  ];

  fields.forEach(field => {

    const value =
      params.get(field);

    if (value) {

      document
        .getElementById(field)
        .value = value;

    }

  });
}

window.onload = importRide;

// ======================
// REQUIRED FIELDS
// ======================
function requireFields(fields) {

  for (const field of fields) {

    const value =
      document
        .getElementById(field)
        .value
        .trim();

    if (!value) {

      alert(
        "Missing field: " + field
      );

      return false;
    }
  }

  return true;
}

// ======================
// SAFE FILE NAME
// ======================
function safeFileName(text) {

  return text
    .replace(/[^\w\s-]/g, "")
    .replace(/\s+/g, "_");
}

// ======================
// DATE FORMATTERS
// ======================
function formatCalendarDate(date, time) {

  return date.replaceAll("-", "") +
    "T" +
    time.replace(":", "") +
    "00";
}

function plusOneHour(date, time) {

  const start =
    new Date(`${date}T${time}`);

  const end =
    new Date(
      start.getTime() +
      60 * 60 * 1000
    );

  const pad = n =>
    String(n).padStart(2, "0");

  return (
    end.getFullYear() +
    pad(end.getMonth() + 1) +
    pad(end.getDate()) +
    "T" +
    pad(end.getHours()) +
    pad(end.getMinutes()) +
    "00"
  );
}

// ======================
// ADD TO CALENDAR
// ======================
function processCalendarEvent() {

  if (!requireFields([
    "name",
    "date",
    "time"
  ])) return;

  const isiPhone =
    /iPhone|iPad|iPod/i.test(
      navigator.userAgent
    );

  if (isiPhone) {

    openGoogleCalendar();

  } else {

    downloadICS();

    setTimeout(() => {

      openGoogleCalendar();

    }, 500);
  }
}

// ======================
// GOOGLE CALENDAR
// ======================
function openGoogleCalendar() {

  const name =
    document.getElementById(
      "name"
    ).value;

  const flight =
    document.getElementById(
      "flight"
    ).value || "N/A";

  const phone =
    document.getElementById(
      "phone"
    ).value;

  const pickup =
    document.getElementById(
      "pickup"
    ).value;

  const dropoff =
    document.getElementById(
      "dropoff"
    ).value;

  const date =
    document.getElementById(
      "date"
    ).value;

  const time =
    document.getElementById(
      "time"
    ).value;

  const details =
`Customer: ${name}

Phone: ${phone}

Flight: ${flight}

Pickup:
${pickup}

Drop-off:
${dropoff}`;

  const url =
`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent("Ride for " + name)}&dates=${formatCalendarDate(date,time)}/${plusOneHour(date,time)}&details=${encodeURIComponent(details)}&location=${encodeURIComponent(pickup)}`;

  window.open(
    url,
    "_blank"
  );

  setTimeout(() => {

    window.focus();

  }, 1200);
}

// ======================
// DOWNLOAD ICS
// ======================
function downloadICS() {

  const name =
    document.getElementById(
      "name"
    ).value;

  const flight =
    document.getElementById(
      "flight"
    ).value || "N/A";

  const phone =
    document.getElementById(
      "phone"
    ).value;

  const pickup =
    document.getElementById(
      "pickup"
    ).value;

  const dropoff =
    document.getElementById(
      "dropoff"
    ).value;

  const date =
    document.getElementById(
      "date"
    ).value;

  const time =
    document.getElementById(
      "time"
    ).value;

  const start =
    formatCalendarDate(
      date,
      time
    );

  const end =
    plusOneHour(
      date,
      time
    );

  const stamp =
    new Date()
    .toISOString()
    .replace(/[-:]/g, "")
    .split(".")[0] + "Z";

  const ics =
`BEGIN:VCALENDAR
VERSION:2.0
CALSCALE:GREGORIAN
BEGIN:VEVENT
DTSTAMP:${stamp}
DTSTART:${start}
DTEND:${end}
SUMMARY:Ride for ${name}
DESCRIPTION:Phone: ${phone}\\nFlight: ${flight}\\nPickup: ${pickup}\\nDrop-off: ${dropoff}
LOCATION:${pickup}
STATUS:CONFIRMED
END:VEVENT
END:VCALENDAR`;

  const blob =
    new Blob(
      [ics],
      {
        type:
"text/calendar;charset=utf-8"
      }
    );

  const fileName =
`${safeFileName(name)}-${date}-${time.replace(":","-")}.ics`;

  const url =
    URL.createObjectURL(blob);

  const link =
    document.createElement("a");

  link.href = url;

  link.download =
    fileName;

  document.body.appendChild(link);

  link.click();

  document.body.removeChild(link);

  setTimeout(() => {

    URL.revokeObjectURL(url);

  }, 3000);
}

// ======================
// SAVE CONTACT
// ======================
function downloadVCF() {

  if (!requireFields([
    "name",
    "phone"
  ])) return;

  const name =
    document.getElementById(
      "name"
    ).value;

  const phone =
    document.getElementById(
      "phone"
    ).value;

  const vcf =
`BEGIN:VCARD
VERSION:3.0
FN:${name}
TEL;TYPE=CELL:${phone}
END:VCARD`;

  const blob =
    new Blob(
      [vcf],
      {
        type:
"text/vcard;charset=utf-8"
      }
    );

  const url =
    URL.createObjectURL(blob);

  const link =
    document.createElement("a");

  link.href = url;

  link.download =
`${safeFileName(name)}.vcf`;

  document.body.appendChild(link);

  link.click();

  document.body.removeChild(link);

  setTimeout(() => {

    URL.revokeObjectURL(url);

  }, 3000);
}

// ======================
// CALL CUSTOMER
// ======================
function callCustomer() {

  const phone =
    document.getElementById(
      "phone"
    ).value;

  if (!phone) {

    alert(
      "Missing customer phone number"
    );

    return;
  }

  window.location.href =
`tel:${phone}`;
}

// ======================
// OPEN WAZE
// ======================
function openWaze() {

  const pickup =
    document.getElementById(
      "pickup"
    ).value;

  if (!pickup) {

    alert(
      "Missing pickup address"
    );

    return;
  }

  const url =
`https://waze.com/ul?q=${encodeURIComponent(pickup)}&navigate=yes`;

  window.open(
    url,
    "_blank"
  );
}

// ======================
// DRIVER DISPATCH
// ======================
function textDriver() {

  const driver =
    document.getElementById(
      "driverPhone"
    ).value;

  if (!driver) {

    alert(
      "Please select a driver."
    );

    return;
  }

  const driverName =
    document.getElementById(
      "driverPhone"
    ).options[
      document.getElementById(
        "driverPhone"
      ).selectedIndex
    ].text;

  const name =
    document.getElementById(
      "name"
    ).value;

  const phone =
    document.getElementById(
      "phone"
    ).value;

  const flight =
    document.getElementById(
      "flight"
    ).value || "N/A";

  const pickup =
    document.getElementById(
      "pickup"
    ).value;

  const dropoff =
    document.getElementById(
      "dropoff"
    ).value;

  const date =
    document.getElementById(
      "date"
    ).value;

  const time =
    document.getElementById(
      "time"
    ).value;

  const instructions =
    document.getElementById(
      "driverComments"
    ).value || "None";

  const message =
`🚕 DRIVER ASSIGNMENT

Driver:
${driverName}

Customer:
${name}

Phone:
${phone}

Flight:
${flight}

Pickup:
${pickup}

Drop-off:
${dropoff}

Date:
${date}

Time:
${time}

Instructions:
${instructions}

Mike's Transport Service`;

  window.location.href =
`sms:${driver}?body=${encodeURIComponent(message)}`;
}

// ======================
// CUSTOMER CONFIRMATION
// ======================
function sendConfirmation() {

  const phone =
    document.getElementById(
      "phone"
    ).value;

  const name =
    document.getElementById(
      "name"
    ).value;

  const pickup =
    document.getElementById(
      "pickup"
    ).value;

  const dropoff =
    document.getElementById(
      "dropoff"
    ).value;

  const date =
    document.getElementById(
      "date"
    ).value;

  const time =
    document.getElementById(
      "time"
    ).value;

  const message =
`Hi ${name},

Your ride with Mike's Transport Service is confirmed.

Pickup:
${pickup}

Drop-off:
${dropoff}

Date:
${date}

Time:
${time}

Thank you for choosing Mike's Transport Service.`;

  window.location.href =
`sms:${phone}?body=${encodeURIComponent(message)}`;
}

// ======================
// CLEAR FORM
// ======================
function clearForm() {

  if (
    !confirm(
      "Clear ride form?"
    )
  ) return;

  document
    .querySelectorAll(
      "input, textarea"
    )
    .forEach(field => {

      field.value = "";
    });

  document.getElementById(
    "driverPhone"
  ).selectedIndex = 0;
}

</script>

</body>
</html>
