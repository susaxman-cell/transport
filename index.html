<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<meta
  name="format-detection"
  content="telephone=no"
>

<title>Mike's Transport Service</title>

<!-- PWA -->
<link
  rel="manifest"
  href="/dispatcher-manifest.json"
>

<meta
  name="theme-color"
  content="#111111"
>

<meta
  name="apple-mobile-web-app-capable"
  content="yes"
>

<meta
  name="mobile-web-app-capable"
  content="yes"
>

<meta
  name="apple-mobile-web-app-status-bar-style"
  content="black"
>

<meta
  name="apple-mobile-web-app-title"
  content="Mike Dispatch"
>

<style>

html {
  -webkit-text-size-adjust: 100%;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 12px;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

.container {
  width: 100%;
  max-width: 700px;
  margin: auto;
}

.header {
  text-align: center;
  margin-bottom: 18px;
}

.header h1 {
  margin: 0;
  font-size: 30px;
}

.header h2 {
  margin-top: 5px;
  color: #666;
  font-size: 18px;
  font-weight: normal;
}

.section-title {
  margin-top: 22px;
  margin-bottom: 10px;
  font-size: 20px;
  font-weight: bold;
}

label {
  display: block;
  margin-top: 14px;
  margin-bottom: 6px;
  font-weight: bold;
}

input,
textarea,
select,
button {
  width: 100%;
  padding: 15px;
  font-size: 17px;
  border-radius: 12px;
  border: 1px solid #ccc;
}

textarea {
  min-height: 100px;
  resize: vertical;
}

button {
  background: #111;
  color: white;
  border: none;
  cursor: pointer;
  font-weight: bold;
  margin-top: 12px;
}

button:active {
  transform: scale(0.98);
}

.status-bar {
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  background: white;
  border: 1px solid #ddd;
  text-align: center;
  font-size: 16px;
}

.notice {
  margin-top: 20px;
  text-align: center;
  color: #666;
  font-size: 14px;
}

.counter {
  text-align: right;
  color: #666;
  font-size: 13px;
  margin-top: 4px;
}

/* PIN SCREEN */
#pinScreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #111;
  z-index: 9999;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.pin-box {
  width: 100%;
  max-width: 400px;
  background: white;
  padding: 25px;
  border-radius: 16px;
  text-align: center;
}

.pin-error {
  color: red;
  margin-top: 10px;
  display: none;
  font-weight: bold;
}

@media (max-width: 600px) {

  .header h1 {
    font-size: 26px;
  }

  .header h2 {
    font-size: 16px;
  }

  input,
  textarea,
  select,
  button {
    font-size: 18px;
  }
}

</style>
</head>

<body>

<!-- PIN LOCK -->
<div id="pinScreen">

  <div class="pin-box">

    <h2>
      Dispatcher Dashboard
    </h2>

    <p>
      Enter Access PIN
    </p>

    <input
      id="pinInput"
      type="password"
      placeholder="Enter PIN"
      style="text-align:center;"
    >

    <button onclick="unlockDashboard()">
      Unlock Dashboard
    </button>

    <div
      id="pinError"
      class="pin-error"
    >
      Incorrect PIN
    </div>

  </div>

</div>

<div class="container">

<div class="header">

  <h1>
    Mike's Transport Service
  </h1>

  <h2>
    Dispatcher Dashboard
  </h2>

</div>

<!-- STATUS -->
<div
  id="connectionStatus"
  class="status-bar">
</div>

<div class="section-title">
Ride Details
</div>

<label>
Customer Name
</label>

<input
  id="name"
  placeholder="Customer Name"
>

<label>
Flight Number
</label>

<input
  id="flight"
  placeholder="Flight Number"
>

<label>
Customer Phone
</label>

<input
  id="phone"
  type="tel"
  inputmode="numeric"
  maxlength="15"
  placeholder="Customer Phone"
>

<label>
Pickup Address
</label>

<input
  id="pickup"
  placeholder="Pickup Address"
>

<label>
Drop-off Address
</label>

<input
  id="dropoff"
  placeholder="Drop-off Address"
>

<label>
Date
</label>

<input
  id="date"
  type="date"
>

<label>
Time
</label>

<input
  id="time"
  type="time"
>

<label>
Assign Driver
</label>

<select id="driverPhone">

  <option value="">
    Select Driver
  </option>

  <option value="9124014964">
    Mike
  </option>

  <option value="5712765400">
    Marcus
  </option>

  <option value="7049687843">
    Bill
  </option>

  <option value="9123417484">
    Rod
  </option>

  <option value="4406548497">
    Taylor
  </option>

</select>

<label>
Driver Instructions
</label>

<textarea
  id="driverComments"
  maxlength="200"
  placeholder="Driver Instructions">
</textarea>

<div
  id="driverCount"
  class="counter">
  0 / 200
</div>

<label>
Customer Comments
</label>

<textarea
  id="customerComments"
  maxlength="200"
  placeholder="Comments to customer">
</textarea>

<div
  id="customerCount"
  class="counter">
  0 / 200
</div>

<div class="section-title">
Dispatcher Actions
</div>

<label>
Load Test Ride
</label>

<button onclick="loadTestRide()">
🧪 Load Test Ride
</button>

<button onclick="callCustomer()">
📞 Call Customer
</button>

<button onclick="processCalendarEvent()">
📅 Add to Google Calendar + Download .ICS
</button>

<button onclick="textDriver()">
🚕 Dispatch Driver
</button>

<button onclick="sendConfirmation()">
📩 Send Customer Confirmation
</button>

<button onclick="downloadVCF()">
👤 Save Customer Contact
</button>

<button onclick="clearForm()">
🗑 Clear Ride Form
</button>

<button onclick="dispatchAll()">
🚀 Dispatch All
</button>

<div class="notice">
Optimized for iPhone, Android, and Desktop.
</div>

</div>

<script>

// ======================
// SERVICE WORKER
// ======================
if ("serviceWorker" in navigator) {

  navigator.serviceWorker.register(
    "/sw.js"
  );
}

// ======================
// WAKE LOCK
// ======================
let wakeLock = null;

async function requestWakeLock() {

  try {

    wakeLock =
      await navigator.wakeLock.request(
        "screen"
      );

  } catch (err) {

    console.log(err);
  }
}

if ("wakeLock" in navigator) {

  requestWakeLock();

  document.addEventListener(
    "visibilitychange",
    () => {

      if (
        wakeLock !== null &&
        document.visibilityState === "visible"
      ) {

        requestWakeLock();
      }
    }
  );
}

// ======================
// DISPATCHER PIN
// ======================
const DISPATCHER_PIN = "2468";

function unlockDashboard() {

  const enteredPin =
    document.getElementById(
      "pinInput"
    ).value;

  const error =
    document.getElementById(
      "pinError"
    );

  if (enteredPin === DISPATCHER_PIN) {

    document.getElementById(
      "pinScreen"
    ).style.display = "none";

    sessionStorage.setItem(
      "dispatcherUnlocked",
      "true"
    );

    startActivityTracking();

  } else {

    error.style.display = "block";
  }
}

if (
  sessionStorage.getItem(
    "dispatcherUnlocked"
  ) === "true"
) {

  window.addEventListener(
    "load",
    () => {

      document.getElementById(
        "pinScreen"
      ).style.display = "none";

      startActivityTracking();
    }
  );
}

// ======================
// AUTO LOCK
// ======================
const AUTO_LOCK_TIME =
  15 * 60 * 1000;

let inactivityTimer;

function resetInactivityTimer() {

  clearTimeout(
    inactivityTimer
  );

  inactivityTimer =
    setTimeout(
      lockDashboard,
      AUTO_LOCK_TIME
    );
}

function lockDashboard() {

  sessionStorage.removeItem(
    "dispatcherUnlocked"
  );

  document.getElementById(
    "pinScreen"
  ).style.display = "flex";

  document.getElementById(
    "pinInput"
  ).value = "";
}

function startActivityTracking() {

  [
    "click",
    "touchstart",
    "keydown",
    "mousemove",
    "scroll"
  ].forEach(event => {

    document.addEventListener(
      event,
      resetInactivityTimer
    );
  });

  resetInactivityTimer();
}

// ======================
// ONLINE STATUS
// ======================
function updateConnectionStatus() {

  const status =
    document.getElementById(
      "connectionStatus"
    );

  if (navigator.onLine) {

    status.innerHTML =
`
<span style="
color:green;
font-weight:bold;
font-size:18px;
">
🟢 Online
</span>
`;

  } else {

    status.innerHTML =
`
<span style="
color:red;
font-weight:bold;
font-size:18px;
">
🔴 Offline Mode
</span>

<br><br>

SMS dispatch still works.
`;
  }
}

updateConnectionStatus();

window.addEventListener(
  "online",
  updateConnectionStatus
);

window.addEventListener(
  "offline",
  updateConnectionStatus
);

// ======================
// COMMENT COUNTERS
// ======================
document.getElementById(
  "driverComments"
).addEventListener(
  "input",
  function() {

    document.getElementById(
      "driverCount"
    ).innerText =
`${this.value.length} / 200`;
  }
);

document.getElementById(
  "customerComments"
).addEventListener(
  "input",
  function() {

    document.getElementById(
      "customerCount"
    ).innerText =
`${this.value.length} / 200`;
  }
);

// ======================
// VALIDATION
// ======================
function validateRideForm() {

  const requiredFields = [
    "name",
    "phone",
    "pickup",
    "dropoff",
    "date",
    "time"
  ];

  for (const id of requiredFields) {

    const value =
      document.getElementById(
        id
      ).value.trim();

    if (!value) {

      alert(
        "Please complete all required ride details."
      );

      document.getElementById(
        id
      ).focus();

      return false;
    }
  }

  return true;
}

// ======================
// CALL CUSTOMER
// ======================
function callCustomer() {

  const phone =
    document.getElementById(
      "phone"
    ).value;

  if (!phone) {

    alert(
      "Customer phone required."
    );

    return;
  }

  window.location.href =
`tel:${phone}`;
}

// ======================
// SAFE FILE NAMES
// ======================
function safeParts() {

  const name =
    document.getElementById(
      "name"
    ).value || "ride";

  const date =
    document.getElementById(
      "date"
    ).value || "no-date";

  const time =
    document.getElementById(
      "time"
    ).value || "no-time";

  return {

    name:
      name.replace(/\s+/g, "_"),

    date,

    time:
      time.replace(/:/g, "-")
  };
}

// ======================
// DATE FORMAT
// ======================
function format(date, time) {

  return date.replaceAll("-", "") +
    "T" +
    time.replace(":", "") +
    "00";
}

function plusHour(date, time) {

  const [year, month, day] =
    date.split("-");

  const [hour, minute] =
    time.split(":");

  const d =
    new Date(
      year,
      month - 1,
      day,
      hour,
      minute
    );

  d.setHours(
    d.getHours() + 1
  );

  const yyyy =
    d.getFullYear();

  const mm =
    String(
      d.getMonth() + 1
    ).padStart(2, "0");

  const dd =
    String(
      d.getDate()
    ).padStart(2, "0");

  const hh =
    String(
      d.getHours()
    ).padStart(2, "0");

  const min =
    String(
      d.getMinutes()
    ).padStart(2, "0");

  return `${yyyy}${mm}${dd}T${hh}${min}00`;
}

// ======================
// GOOGLE CALENDAR
// ======================
function processCalendarEvent() {

  if (!validateRideForm()) return;

  addGoogle();

  downloadICS();
}

function addGoogle() {

  const name =
    document.getElementById(
      "name"
    ).value;

  const phone =
    document.getElementById(
      "phone"
    ).value;

  const pickup =
    document.getElementById(
      "pickup"
    ).value;

  const dropoff =
    document.getElementById(
      "dropoff"
    ).value;

  const date =
    document.getElementById(
      "date"
    ).value;

  const time =
    document.getElementById(
      "time"
    ).value;

  const details =
`Customer: ${name}

Phone: ${phone}

Pickup:
${pickup}

Drop-off:
${dropoff}`;

  const url =
`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent("Ride for " + name)}&dates=${format(date,time)}/${plusHour(date,time)}&details=${encodeURIComponent(details)}&location=${encodeURIComponent(pickup)}`;

  window.open(
    url,
    "_blank"
  );
}

// ======================
// DOWNLOAD ICS
// ======================
function downloadICS() {

  const name =
    document.getElementById(
      "name"
    ).value;

  const phone =
    document.getElementById(
      "phone"
    ).value;

  const pickup =
    document.getElementById(
      "pickup"
    ).value;

  const dropoff =
    document.getElementById(
      "dropoff"
    ).value;

  const date =
    document.getElementById(
      "date"
    ).value;

  const time =
    document.getElementById(
      "time"
    ).value;

  const now =
    new Date()
    .toISOString()
    .replace(/[-:]/g, "")
    .split(".")[0];

  const ics =
`BEGIN:VCALENDAR
VERSION:2.0
METHOD:PUBLISH
BEGIN:VEVENT
UID:${Date.now()}@mikestransportservice.com
DTSTAMP:${now}
DTSTART:${format(date,time)}
DTEND:${plusHour(date,time)}
SUMMARY:Ride for ${name}
DESCRIPTION:Phone: ${phone}\\nPickup: ${pickup}\\nDrop-off: ${dropoff}
LOCATION:${pickup}
END:VEVENT
END:VCALENDAR`;

  const blob =
    new Blob(
      [ics],
      {
        type:
"text/calendar;charset=utf-8;"
      }
    );

  const p =
    safeParts();

  const link =
    document.createElement(
      "a"
    );

  link.href =
    URL.createObjectURL(blob);

  link.download =
`${p.name}-${p.date}-${p.time}.ics`;

  link.click();
}

// ======================
// DRIVER DISPATCH
// ======================
function textDriver() {

  if (!validateRideForm()) return;

  const driver =
    document.getElementById(
      "driverPhone"
    ).value;

  if (!driver) {

    alert(
      "Please select a driver."
    );

    return;
  }

  const driverName =
    document.getElementById(
      "driverPhone"
    ).options[
      document.getElementById(
        "driverPhone"
      ).selectedIndex
    ].text;

  const name =
    document.getElementById(
      "name"
    ).value;

  const phone =
    document.getElementById(
      "phone"
    ).value;

  const flight =
    document.getElementById(
      "flight"
    ).value || "N/A";

  const pickup =
    document.getElementById(
      "pickup"
    ).value;

  const dropoff =
    document.getElementById(
      "dropoff"
    ).value;

  const date =
    document.getElementById(
      "date"
    ).value;

  const time =
    document.getElementById(
      "time"
    ).value;

  const instructions =
    document.getElementById(
      "driverComments"
    ).value || "None";

  const pickupEncoded =
    encodeURIComponent(
      pickup
    );

  const dropoffEncoded =
    encodeURIComponent(
      dropoff
    );

  const wazePickup =
`https://waze.com/ul?q=${pickupEncoded}`;

  const googlePickup =
`https://www.google.com/maps/search/?api=1&query=${pickupEncoded}`;

  const wazeDropoff =
`https://waze.com/ul?q=${dropoffEncoded}`;

  const googleDropoff =
`https://www.google.com/maps/search/?api=1&query=${dropoffEncoded}`;

  const details =
`Customer: ${name}

Phone: ${phone}

Pickup:
${pickup}

Drop-off:
${dropoff}

Driver:
${driverName}`;

  const driverCalendarLink =
`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent("Ride for " + name)}&dates=${format(date,time)}/${plusHour(date,time)}&details=${encodeURIComponent(details)}&location=${encodeURIComponent(pickup)}`;

  const message =
`🚕 DRIVER ASSIGNMENT

Driver:
${driverName}

Customer:
${name}

Phone:
${phone}

Flight:
${flight}

Pickup:
${pickup}

Pickup Navigation:
${wazePickup}

${googlePickup}

Drop-off:
${dropoff}

Drop-off Navigation:
${wazeDropoff}

${googleDropoff}

Date:
${date}

Time:
${time}

Instructions:
${instructions}

Add Ride To Calendar:
${driverCalendarLink}

Assigned Driver`;

  window.location.href =
`sms:${driver}?body=${encodeURIComponent(message)}`;
}

// ======================
// CUSTOMER CONFIRMATION
// ======================
function sendConfirmation() {

  if (!validateRideForm()) return;

  const phone =
    document.getElementById(
      "phone"
    ).value;

  const name =
    document.getElementById(
      "name"
    ).value;

  const pickup =
    document.getElementById(
      "pickup"
    ).value;

  const dropoff =
    document.getElementById(
      "dropoff"
    ).value;

  const date =
    document.getElementById(
      "date"
    ).value;

  const time =
    document.getElementById(
      "time"
    ).value;

  const customerComments =
    document.getElementById(
      "customerComments"
    ).value || "None";

  const driverName =
    document.getElementById(
      "driverPhone"
    ).options[
      document.getElementById(
        "driverPhone"
      ).selectedIndex
    ].text || "Assigned Driver";

  const message =
`Hi ${name},

Your ride is confirmed.

Driver:
${driverName}

Pickup:
${pickup}

Drop-off:
${dropoff}

Date:
${date}

Time:
${time}

Comments:
${customerComments}

Thank you.`;

  window.location.href =
`sms:${phone}?body=${encodeURIComponent(message)}`;
}

// ======================
// SAVE CONTACT
// ======================
function downloadVCF() {

  const name =
    document.getElementById(
      "name"
    ).value;

  const phone =
    document.getElementById(
      "phone"
    ).value;

  const vcf =
`BEGIN:VCARD
VERSION:3.0
FN:${name}
TEL:${phone}
END:VCARD`;

  const blob =
    new Blob(
      [vcf],
      {
        type:
"text/vcard"
      }
    );

  const link =
    document.createElement(
      "a"
    );

  link.href =
    URL.createObjectURL(blob);

  link.download =
`${name}.vcf`;

  link.click();
}

// ======================
// LOAD TEST RIDE
// ======================
function loadTestRide() {

  const today =
    new Date();

  const yyyy =
    today.getFullYear();

  const mm =
    String(
      today.getMonth() + 1
    ).padStart(2, "0");

  const dd =
    String(
      today.getDate()
    ).padStart(2, "0");

  document.getElementById(
    "name"
  ).value = "Test Rider";

  document.getElementById(
    "flight"
  ).value = "DL1234";

  document.getElementById(
    "phone"
  ).value = "9124014964";

  document.getElementById(
    "pickup"
  ).value =
"SAV Airport";

  document.getElementById(
    "dropoff"
  ).value =
"1260 May River Rd, Bluffton SC";

  document.getElementById(
    "date"
  ).value =
`${yyyy}-${mm}-${dd}`;

  document.getElementById(
    "time"
  ).value = "12:00";

  document.getElementById(
    "driverPhone"
  ).selectedIndex = 1;

  document.getElementById(
    "driverComments"
  ).value =
"";

  document.getElementById(
    "customerComments"
  ).value =
"";

  document.getElementById(
    "driverCount"
  ).innerText =
`${document.getElementById("driverComments").value.length} / 200`;

  document.getElementById(
    "customerCount"
  ).innerText =
`${document.getElementById("customerComments").value.length} / 200`;

  alert(
    "Test ride loaded successfully."
  );
}

// ======================
// CLEAR FORM
// ======================
function clearForm() {

  if (
    !confirm(
      "Clear ride form?"
    )
  ) return;

  document.querySelectorAll(
    "input, textarea"
  ).forEach(field => {

    field.value = "";
  });

  document.getElementById(
    "driverPhone"
  ).selectedIndex = 0;

  document.getElementById(
    "driverCount"
  ).innerText =
"0 / 200";

  document.getElementById(
    "customerCount"
  ).innerText =
"0 / 200";
}

// ======================
// DISPATCH ALL
// ======================
function dispatchAll() {

  if (!validateRideForm()) return;

  processCalendarEvent();

  downloadVCF();

  setTimeout(() => {

    textDriver();

  }, 500);

  setTimeout(() => {

    sendConfirmation();

  }, 1500);
}

</script>

</body>
</html>
