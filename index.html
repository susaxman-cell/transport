<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<meta
  name="format-detection"
  content="telephone=no"
>

<title>Mike's Transport Service</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  padding:14px;
  background:#f5f5f5;
  font-family:Arial,sans-serif;
  color:#111;
}

.container{
  max-width:700px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:18px;
  box-shadow:0 2px 12px rgba(0,0,0,.08);
}

.header{
  text-align:center;
  margin-bottom:24px;
}

.header h1{
  margin:0;
  font-size:30px;
}

.header h2{
  margin-top:6px;
  color:#666;
  font-size:18px;
  font-weight:normal;
}

.section-title{
  margin-top:28px;
  margin-bottom:10px;
  padding-bottom:6px;
  border-bottom:1px solid #ddd;
  font-size:18px;
  font-weight:bold;
}

label{
  display:block;
  margin-top:16px;
  margin-bottom:6px;
  font-weight:bold;
}

input,
textarea,
select,
button{
  width:100%;
  padding:16px;
  border-radius:12px;
  border:1px solid #ccc;
  font-size:17px;
  background:white;
}

textarea{
  min-height:110px;
  resize:vertical;
}

input:focus,
textarea:focus,
select:focus{
  outline:none;
  border-color:#111;
  box-shadow:0 0 0 2px rgba(0,0,0,.1);
}

button{
  margin-top:14px;
  border:none;
  background:#111;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:active{
  transform:scale(.98);
}

.status{
  margin-bottom:18px;
  padding:12px;
  border-radius:10px;
  background:white;
  border:1px solid #ddd;
  text-align:center;
  font-weight:bold;
}

.footer-space{
  height:20px;
}

@media(max-width:600px){

  body{
    padding:10px;
  }

  .container{
    padding:16px;
  }

  .header h1{
    font-size:24px;
  }

  .header h2{
    font-size:16px;
  }

  input,
  textarea,
  select,
  button{
    font-size:18px;
  }

}

</style>
</head>

<body>

<div class="container">

<div class="header">
  <h1>Mike's Transport Service</h1>
  <h2>Dispatcher Dashboard</h2>
</div>

<div
  id="connectionStatus"
  class="status"
>
Checking connection...
</div>

<div class="section-title">
Ride Details
</div>

<label for="name">
Customer Name
</label>

<input
  id="name"
  placeholder="Full Name"
  autocomplete="name"
>

<label for="flight">
Flight Number
</label>

<input
  id="flight"
  placeholder="Flight Number"
>

<label for="phone">
Customer Phone
</label>

<input
  id="phone"
  type="tel"
  inputmode="tel"
  placeholder="Phone Number"
>

<label for="homeAddress">
Home Address
</label>

<input
  id="homeAddress"
  placeholder="Customer Home Address"
>

<label for="pickup">
Pickup Address
</label>

<input
  id="pickup"
  placeholder="Pickup Address"
>

<label for="dropoff">
Drop-off Address
</label>

<input
  id="dropoff"
  placeholder="Drop-off Address"
>

<label for="date">
Date
</label>

<input
  id="date"
  type="date"
>

<label for="time">
Time
</label>

<input
  id="time"
  type="time"
>

<label for="comments">
Driver Instructions
</label>

<textarea
  id="comments"
  maxlength="300"
  placeholder="Instructions for driver"
></textarea>

<div class="section-title">
Assign Driver
</div>

<select id="driver">

  <option value="">
    Select Driver
  </option>

  <option value="Mike Owner|9124014964">
    Mike Owner
  </option>

  <option value="Marcus Driver|5712765400">
    Marcus Driver
  </option>

  <option value="Bill Driver|7049687843">
    Bill Driver
  </option>

  <option value="Rod Driver|9123417484">
    Rod Driver
  </option>

  <option value="Taylor Driver|4406548497">
    Taylor Driver
  </option>

</select>

<div class="section-title">
Dispatcher Actions
</div>

<button onclick="processCalendarEvent()">
📅 Add to Google Calendar + Download .ICS
</button>

<button onclick="textDriver()">
🚕 Dispatch Driver
</button>

<button onclick="downloadVCF()">
👤 Save Customer Contact
</button>

<button onclick="sendConfirmation()">
📩 Send Customer Confirmation
</button>

<button onclick="callDriver()">
📞 Call Driver
</button>

<button onclick="callCustomer()">
📱 Call Customer
</button>

<button onclick="loadTestRide()">
🧪 Load Test Ride
</button>

<button onclick="clearForm()">
🗑 Clear Ride Form
</button>

<div class="footer-space"></div>

</div>

<script>

// ======================
// ONLINE STATUS
// ======================

function updateConnectionStatus(){

  const status =
    document.getElementById(
      "connectionStatus"
    );

  if(navigator.onLine){

    status.innerHTML =
      "🟢 Online";

    status.style.color =
      "green";

  }else{

    status.innerHTML =
      "🔴 Offline";

    status.style.color =
      "red";

  }

}

updateConnectionStatus();

window.addEventListener(
  "online",
  updateConnectionStatus
);

window.addEventListener(
  "offline",
  updateConnectionStatus
);

// ======================
// IMPORT FROM URL
// ======================

function importRide(){

  const params =
    new URLSearchParams(
      window.location.search
    );

  const fields = [
    "name",
    "flight",
    "phone",
    "homeAddress",
    "pickup",
    "dropoff",
    "date",
    "time",
    "comments"
  ];

  fields.forEach(field=>{

    const value =
      params.get(field);

    if(value){

      document
        .getElementById(field)
        .value = value;

    }

  });

}

window.onload = importRide;

// ======================
// SAFE FILE NAME
// ======================

function safeFileName(text){

  return text
    .replace(/[^\w\s-]/g,"")
    .replace(/\s+/g,"_");

}

// ======================
// FORMAT DATE
// ======================

function formatICSDate(date,time){

  const d =
    new Date(`${date}T${time}`);

  const pad = n =>
    String(n).padStart(2,"0");

  return (
    d.getFullYear() +
    pad(d.getMonth()+1) +
    pad(d.getDate()) +
    "T" +
    pad(d.getHours()) +
    pad(d.getMinutes()) +
    "00"
  );

}

// ======================
// PLUS 1 HOUR
// ======================

function plusOneHour(date,time){

  const d =
    new Date(`${date}T${time}`);

  d.setHours(
    d.getHours()+1
  );

  const pad = n =>
    String(n).padStart(2,"0");

  return (
    d.getFullYear() +
    pad(d.getMonth()+1) +
    pad(d.getDate()) +
    "T" +
    pad(d.getHours()) +
    pad(d.getMinutes()) +
    "00"
  );

}

// ======================
// GOOGLE CALENDAR + ICS
// ======================

function processCalendarEvent(){

  const name =
    document.getElementById("name").value;

  const phone =
    document.getElementById("phone").value;

  const flight =
    document.getElementById("flight").value || "N/A";

  const pickup =
    document.getElementById("pickup").value;

  const dropoff =
    document.getElementById("dropoff").value;

  const date =
    document.getElementById("date").value;

  const time =
    document.getElementById("time").value;

  if(
    !name ||
    !date ||
    !time
  ){

    alert(
      "Missing required fields."
    );

    return;

  }

  const start =
    formatICSDate(date,time);

  const end =
    plusOneHour(date,time);

  // GOOGLE CALENDAR

  const details =
`Customer: ${name}

Phone: ${phone}

Flight: ${flight}

Pickup:
${pickup}

Drop-off:
${dropoff}`;

  const googleURL =
`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent("Ride for " + name)}&dates=${start}/${end}&details=${encodeURIComponent(details)}&location=${encodeURIComponent(pickup)}`;

  window.open(
    googleURL,
    "_blank"
  );

  // ICS DOWNLOAD

  const ics =
`BEGIN:VCALENDAR
VERSION:2.0
BEGIN:VEVENT
SUMMARY:Ride for ${name}
DTSTART:${start}
DTEND:${end}
DESCRIPTION:Phone: ${phone}\\nFlight: ${flight}\\nPickup: ${pickup}\\nDrop-off: ${dropoff}
LOCATION:${pickup}
STATUS:CONFIRMED
END:VEVENT
END:VCALENDAR`;

  const blob =
    new Blob(
      [ics],
      {
        type:
        "text/calendar;charset=utf-8"
      }
    );

  const url =
    URL.createObjectURL(blob);

  const link =
    document.createElement("a");

  link.href = url;

  link.download =
`${safeFileName(name)}-${date}-${time}.ics`;

  document.body.appendChild(link);

  link.click();

  document.body.removeChild(link);

  setTimeout(()=>{

    URL.revokeObjectURL(url);

  },3000);

}

// ======================
// SAVE CONTACT
// ======================

function downloadVCF(){

  const name =
    document.getElementById("name").value;

  const phone =
    document.getElementById("phone").value;

  const homeAddress =
    document.getElementById("homeAddress").value;

  if(!name || !phone){

    alert(
      "Missing customer info."
    );

    return;

  }

  const vcf =
`BEGIN:VCARD
VERSION:3.0
FN:${name}
TEL;TYPE=CELL:${phone}
ADR:;;${homeAddress}
END:VCARD`;

  const blob =
    new Blob(
      [vcf],
      {
        type:"text/vcard"
      }
    );

  const url =
    URL.createObjectURL(blob);

  const link =
    document.createElement("a");

  link.href = url;

  link.download =
`${safeFileName(name)}.vcf`;

  document.body.appendChild(link);

  link.click();

  document.body.removeChild(link);

  setTimeout(()=>{

    URL.revokeObjectURL(url);

  },3000);

}

// ======================
// DRIVER DISPATCH
// ======================

function textDriver(){

  const driver =
    document.getElementById("driver").value;

  if(!driver){

    alert(
      "Select a driver."
    );

    return;

  }

  const [
    driverName,
    driverPhone
  ] = driver.split("|");

  const name =
    document.getElementById("name").value;

  const phone =
    document.getElementById("phone").value;

  const flight =
    document.getElementById("flight").value || "N/A";

  const pickup =
    document.getElementById("pickup").value;

  const dropoff =
    document.getElementById("dropoff").value;

  const date =
    document.getElementById("date").value;

  const time =
    document.getElementById("time").value;

  const comments =
    document.getElementById("comments").value || "None";

  const wazeURL =
`https://waze.com/ul?q=${encodeURIComponent(dropoff)}&navigate=yes`;

  const mapsURL =
`https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(pickup)}&destination=${encodeURIComponent(dropoff)}`;

  const msg =
`🚕 DRIVER ASSIGNMENT

Driver:
${driverName}

Customer:
${name}

Phone:
${phone}

Flight:
${flight}

Pickup:
${pickup}

Drop-off:
${dropoff}

Date:
${date}

Time:
${time}

Instructions:
${comments}

Waze Route:
${wazeURL}

Maps Route:
${mapsURL}

Mike's Transport Service`;

  window.location.href =
`sms:${driverPhone}?body=${encodeURIComponent(msg)}`;

}

// ======================
// CUSTOMER CONFIRMATION
// ======================

function sendConfirmation(){

  const driver =
    document.getElementById("driver").value;

  let driverName =
    "Pending";

  let driverPhone =
    "Pending";

  if(driver){

    const split =
      driver.split("|");

    driverName =
      split[0];

    driverPhone =
      split[1];

  }

  const name =
    document.getElementById("name").value;

  const phone =
    document.getElementById("phone").value;

  const pickup =
    document.getElementById("pickup").value;

  const dropoff =
    document.getElementById("dropoff").value;

  const date =
    document.getElementById("date").value;

  const time =
    document.getElementById("time").value;

  const msg =
`Hi ${name},

Your ride with Mike's Transport Service is confirmed.

Pickup:
${pickup}

Drop-off:
${dropoff}

Date:
${date}

Time:
${time}

Driver:
${driverName}

Driver Phone:
${driverPhone}

Thank you for choosing Mike's Transport Service!`;

  window.location.href =
`sms:${phone}?body=${encodeURIComponent(msg)}`;

}

// ======================
// CALL DRIVER
// ======================

function callDriver(){

  const driver =
    document.getElementById("driver").value;

  if(!driver){

    alert(
      "Select a driver."
    );

    return;

  }

  const phone =
    driver.split("|")[1];

  window.location.href =
`tel:${phone}`;

}

// ======================
// CALL CUSTOMER
// ======================

function callCustomer(){

  const phone =
    document.getElementById("phone").value;

  if(!phone){

    alert(
      "Missing customer phone."
    );

    return;

  }

  window.location.href =
`tel:${phone}`;

}

// ======================
// TEST RIDE
// ======================

function loadTestRide(){

  document.getElementById("name").value =
    "Test Passenger";

  document.getElementById("phone").value =
    "5712765400";

  document.getElementById("pickup").value =
    "SAV Airport";

  document.getElementById("dropoff").value =
    "1260 May River Rd, Bluffton SC";

  document.getElementById("date").value =
    new Date()
      .toISOString()
      .split("T")[0];

  document.getElementById("time").value =
    "12:00";

}

// ======================
// CLEAR FORM
// ======================

function clearForm(){

  if(
    !confirm(
      "Clear ride form?"
    )
  ) return;

  document
    .querySelectorAll(
      "input, textarea"
    )
    .forEach(field=>{

      field.value = "";

    });

  document.getElementById(
    "driver"
  ).selectedIndex = 0;

}

</script>

</body>
</html>
